<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a8bff"/>
      <stop offset="100%" stop-color="#4db8d8"/>
    </linearGradient>
  </defs>

  <!-- Hexagon frame -->
  <polygon points="30,6 46,15 46,33 30,42 14,33 14,15" fill="none" stroke="url(#iconGrad)" stroke-width="2.5"/>
  <!-- Lens circle -->
  <circle cx="30" cy="24" r="9" fill="none" stroke="url(#iconGrad)" stroke-width="2"/>
  <!-- Medical cross -->
  <rect x="28.5" y="19" width="3" height="10" rx="1" fill="url(#iconGrad)"/>
  <rect x="25" y="22.5" width="10" height="3" rx="1" fill="url(#iconGrad)"/>
  <!-- Scope handle -->
  <line x1="37" y1="31" x2="43" y2="38" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="43.5" cy="38.5" r="1.5" fill="#4db8d8"/>

  <!-- Wordmark: single text flow so Medi/Scope join is natural, dx="1" adds 1px breathing room at the colour seam -->
  <text y="33" font-family="'DM Sans', 'Geist Sans', sans-serif" font-weight="700" font-size="22" letter-spacing="0">
    <tspan x="58" fill="#7a8bff">Medi</tspan><tspan fill="#4db8d8" dx="1">Scope</tspan>
  </text>
</svg>
